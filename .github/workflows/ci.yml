name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check maestro

      - name: Format check
        run: uv run ruff format --check maestro

      - name: Type check
        run: uv run mypy maestro

      - name: Test
        run: uv run pytest maestro
